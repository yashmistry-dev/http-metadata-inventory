version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    ports:
      - "27019:27017" # 27019 is on host
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://admin:password@mongodb:27017/
      MONGODB_DB_NAME: metadata_db
    depends_on:
      - mongodb
